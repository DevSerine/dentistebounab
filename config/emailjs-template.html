<p>Nouveau message depuis le site <strong>{{cabinet}}</strong>.</p>

<table style="border-collapse:collapse;width:100%;max-width:560px">
  <tr>
    <td style="padding:8px;border:1px solid #ddd;font-weight:bold">Nom</td>
    <td style="padding:8px;border:1px solid #ddd">{{from_name}}</td>
  </tr>
  <tr>
    <td style="padding:8px;border:1px solid #ddd;font-weight:bold">Email</td>
    <td style="padding:8px;border:1px solid #ddd">{{from_email}}</td>
  </tr>
  <tr>
    <td style="padding:8px;border:1px solid #ddd;font-weight:bold">Objet</td>
    <td style="padding:8px;border:1px solid #ddd">{{subject}}</td>
  </tr>
</table>

<p style="margin-top:16px"><strong>Message :</strong></p>
<p style="white-space:pre-wrap">{{message}}</p>

<p style="color:#666;font-size:12px">Destinataire cabinet : {{to_email}}</p>
